<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurora Veil — Open Design</title>
<!--
  Self-contained WebGL2 hero. Layered aurora curtains: vertical light sheets
  warped by FBM ride over a night-sky gradient with a scatter of stars; the
  curtains sway toward the pointer. No meshes, no textures, no build step.
-->
<style>
  :root{ color-scheme:dark; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#03040c;
    font-family:'Albert Sans',ui-sans-serif,system-ui,-apple-system,sans-serif; color:#eafff6; }
  #gl{ position:fixed; inset:0; width:100%; height:100%; display:block; }
  .overlay{ position:fixed; inset:0; z-index:2; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; padding:5vw; }
  .top{ display:flex; justify-content:space-between; font-size:clamp(11px,1vw,14px); letter-spacing:0.32em; text-transform:uppercase; color:rgba(234,255,246,0.72); }
  .top .dot{ width:8px; height:8px; border-radius:50%; background:#7cffb2; box-shadow:0 0 14px #7cffb2; display:inline-block; margin-right:10px; vertical-align:middle; }
  h1{ margin:0; font-size:clamp(44px,11vw,168px); line-height:0.86; font-weight:800; letter-spacing:-0.04em; mix-blend-mode:screen; }
  h1 .thin{ font-weight:300; }
  .bottom{ display:flex; justify-content:space-between; align-items:flex-end; gap:4vw; }
  .sub{ font-size:clamp(14px,1.5vw,19px); max-width:42ch; color:rgba(234,255,246,0.82); line-height:1.45; margin:0; }
  .badge{ font-size:11px; letter-spacing:0.28em; text-transform:uppercase; color:rgba(234,255,246,0.65); border:1px solid rgba(234,255,246,0.24); padding:9px 15px; border-radius:999px; backdrop-filter:blur(8px); white-space:nowrap; }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="overlay">
  <div class="top"><span><span class="dot"></span>Open Design · WebGL Preview</span><span>Real-time · GPU</span></div>
  <div class="bottom">
    <div><h1>AURORA<br><span class="thin">VEIL</span></h1>
      <p class="sub">Layered light curtains warped over a night sky, scattered with stars. Move the cursor to sway the veil.</p></div>
    <div class="badge">Sway the veil ↗</div>
  </div>
</div>
<script>
(() => {
const canvas=document.getElementById('gl');
const gl=canvas.getContext('webgl2',{antialias:true});
if (!gl) { document.body.innerHTML='<p style="color:#fff;padding:2rem;font-family:sans-serif">WebGL2 not available.</p>'; return; }
const VERT=`#version 300 es
void main(){ vec2 p=vec2((gl_VertexID<<1)&2, gl_VertexID&2); gl_Position=vec4(p*2.0-1.0,0.0,1.0); }`;
const FRAG=`#version 300 es
precision highp float;
out vec4 o;
uniform vec2 u_res; uniform float u_time; uniform vec2 u_mouse;
float hash(vec2 p){ return fract(sin(dot(p,vec2(41.3,289.1)))*43758.5453); }
float noise(vec2 p){ vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y); }
float fbm(vec2 p){ float v=0.0,a=0.5; for(int i=0;i<5;i++){ v+=a*noise(p); p=p*1.9+3.0; a*=0.55; } return v; }
vec3 auroraPal(float t){ // green → teal → violet
  return mix(mix(vec3(0.10,0.9,0.45), vec3(0.15,0.8,0.85), smoothstep(0.0,0.5,t)),
             vec3(0.6,0.35,0.95), smoothstep(0.5,1.0,t));
}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  vec2 p=(gl_FragCoord.xy-0.5*u_res)/u_res.y;
  float sway=(u_mouse.x-0.5)*1.2;
  // night sky gradient
  vec3 col=mix(vec3(0.02,0.03,0.09), vec3(0.03,0.06,0.16), uv.y);
  // stars (upper sky) — sparse points, not streaks
  vec2 sc=floor(gl_FragCoord.xy/3.0);
  float star=step(0.9975, hash(sc))*pow(hash(sc+7.0),2.0)*smoothstep(0.3,1.0,uv.y);
  col+=vec3(0.9,0.95,1.0)*star;
  // aurora curtains: soft sheets whose centre SNAKES horizontally with height + time
  float t=u_time*0.15;
  for(int i=0;i<3;i++){
    float fi=float(i);
    float base=(fi-1.0)*0.55 + sway*(0.35+fi*0.2);
    float cx=base + sin(p.y*1.6 + t*2.0 + fi*2.1)*0.22 + (fbm(vec2(p.y*1.2+fi*3.0, t*1.5))-0.5)*0.7;
    float w=0.15 + 0.09*fbm(vec2(p.y*3.0+fi, t));
    float band=exp(-pow((p.x-cx)/w, 2.0));
    float vert=smoothstep(-0.95,0.8,p.y) * (0.45+0.55*fbm(vec2(p.x*5.0+fi*4.0, p.y*2.6 - t*2.5)));
    float ribbon=band*vert;
    float hue=fract(0.12 + fi*0.28 + p.y*0.16 + t*0.3);
    col += auroraPal(hue) * ribbon * (1.0 - fi*0.14);
  }
  // ground glow + vignette
  col *= 0.7+0.5*smoothstep(1.5,0.1,length(p*vec2(0.6,1.0)));
  col=col/(col+0.8);
  col+=(hash(gl_FragCoord.xy+u_time)-0.5)*0.02;
  o=vec4(pow(max(col,0.0),vec3(0.9)),1.0);
}`;
function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(x);return x;}
const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,VERT));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,FRAG));gl.linkProgram(pr);
if(!gl.getProgramParameter(pr,gl.LINK_STATUS))throw gl.getProgramInfoLog(pr);
gl.useProgram(pr);
const uRes=gl.getUniformLocation(pr,'u_res'),uTime=gl.getUniformLocation(pr,'u_time'),uMouse=gl.getUniformLocation(pr,'u_mouse');
let mouse=[0.5,0.5],target=[0.5,0.5];
addEventListener('pointermove',e=>{target=[e.clientX/innerWidth,1.0-e.clientY/innerHeight];});
function resize(){const d=Math.min(devicePixelRatio||1,2),w=innerWidth*d|0,h=innerHeight*d|0;if(w===canvas.width&&h===canvas.height)return;canvas.width=w;canvas.height=h;gl.viewport(0,0,w,h);}
addEventListener('resize',resize);resize();
const t0=performance.now();
function frame(now){ resize(); mouse[0]+=(target[0]-mouse[0])*0.05; mouse[1]+=(target[1]-mouse[1])*0.05;
  gl.uniform2f(uRes,canvas.width,canvas.height); gl.uniform1f(uTime,(now-t0)/1000); gl.uniform2f(uMouse,mouse[0],mouse[1]);
  gl.drawArrays(gl.TRIANGLES,0,3); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
